DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala Hermínia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0ede8;color:#222;font-size:14px}

/* ── BARRA SUPERIOR ── */
.topbar{
  background:#fff;
  border-bottom:2px solid #d5c9bc;
  padding:10px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.10);
}
.topbar .logo{height:38px;object-fit:contain}
.topbar h1{font-size:16px;font-weight:bold;color:#4c1d95;flex:1;white-space:nowrap}
#monthSelect{
  padding:8px 14px;font-size:14px;font-weight:bold;
  border:2px solid #c8b89a;border-radius:6px;
  background:#fffdf9;color:#3a2a1a;cursor:pointer;
  display:none;min-width:170px;
}
.btn-atualizar{
  padding:8px 18px;font-size:13px;font-weight:bold;
  background:#6d28d9;color:#fff;border:none;
  border-radius:6px;cursor:pointer;white-space:nowrap;
}
.btn-atualizar:hover{background:#5a3620}
.btn-imprimir{
  padding:8px 16px;font-size:13px;font-weight:bold;
  background:#2e6b4f;color:#fff;border:none;
  border-radius:6px;cursor:pointer;white-space:nowrap;display:none;
}
.btn-imprimir:hover{background:#1e4f39}
.status-msg{font-size:11px;color:#888;white-space:nowrap}

/* ── CONTEÚDO ── */
.page{max-width:1180px;margin:18px auto 50px;padding:0 14px}

/* ── CABEÇALHO DO MÊS ── */
.mes-header{
  background:#fff;
  border-radius:10px;
  padding:16px 22px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  border-left:6px solid #8B6914;
}
.mes-header .titulo{font-size:26px;font-weight:bold;color:#4c1d95}
.mes-header .sub{font-size:12px;color:#888;margin-top:3px}
.mes-header .regente{font-size:14px;font-weight:bold;color:#4c1d95;text-align:right}

/* ── GRID 2 COLUNAS ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

/* ── SEÇÃO ── */
.sec{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.sec-hd{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  color:#fff;
}
.sec-hd img{height:60px;width:60px;object-fit:contain;border-radius:6px;background:rgba(255,255,255,0.15);padding:3px;flex-shrink:0}
.sec-hd .tit{font-size:13px;font-weight:bold;letter-spacing:.5px;text-transform:uppercase;line-height:1.3}
.sec-body{padding:8px 10px}

/* dia label */
.dlbl{
  font-size:11px;font-weight:bold;
  background:rgba(0,0,0,0.07);
  padding:3px 8px;margin:5px 0 3px;
  border-radius:3px;text-transform:uppercase;letter-spacing:.5px;
}

/* tabela */
table.t{width:100%;border-collapse:collapse;font-size:13px}
table.t td{padding:3px 6px;border-bottom:1px solid rgba(0,0,0,0.06);vertical-align:middle}
table.t td.dt{color:#aaa;width:38px;font-size:11px;white-space:nowrap}
table.t td.lbl{color:#888;font-size:11px;white-space:nowrap;padding-right:6px}
table.t th{background:rgba(0,0,0,0.06);font-size:11px;padding:3px 6px;text-align:left;font-weight:bold}
.nm{font-weight:bold;font-size:14px}
.nm.vazio{color:#e07070;font-style:italic;font-weight:normal;font-size:12px}
.nm.naosera{color:#bbb;font-weight:normal;font-style:italic;font-size:12px}

/* cores de seção */
.s-oraculo    .sec-hd{background:#7B1010}
.s-cruz       .sec-hd{background:#1A5BB5}
.s-imun       .sec-hd{background:#1B6B30}
.s-estrela    .sec-hd{background:#6A1B9A}
.s-esmenias   .sec-hd{background:#B84000}
.s-julgamento .sec-hd{background:#145214}
.s-arame      .sec-hd{background:#5D3A1A}
.s-leito      .sec-hd{background:#006060}
.s-turigano   .sec-hd{background:#3E1F8C}
.s-bencao     .sec-hd{background:#CC7700}
.s-imantracao .sec-hd{background:#1E3A7A}

/* turigano */
.turg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px;padding:8px}
.turg-dom{border:1px solid rgba(62,31,140,0.2);border-radius:6px;overflow:hidden}
.turg-dom .dom-dt{background:rgba(62,31,140,0.10);font-weight:bold;font-size:11px;padding:4px 8px;text-align:center;text-transform:uppercase;letter-spacing:.5px}

/* imantração */
.imantr-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.imantr-item{display:flex;gap:4px;align-items:center;padding:1px 0}
.imantr-item .pos{font-size:10px;color:#bbb;min-width:14px}

/* sem dados */
.sem-dados{text-align:center;padding:60px 20px;color:#bbb;font-size:15px}

/* rodapé */
.pg-foot{border-top:2px solid #d5c9bc;margin-top:16px;padding-top:8px;text-align:right;font-size:12px;color:#888}

/* modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal-box{background:#fff;border-radius:10px;padding:28px 30px;max-width:580px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.25)}
.modal-box h2{font-size:16px;margin-bottom:8px;color:#3a2a1a}
.modal-box p,.modal-box ol{font-size:12px;color:#555;margin-bottom:8px;line-height:1.7}
.modal-box ol{margin-left:18px}
.modal-box input[type=text]{width:100%;padding:9px 12px;font-size:13px;border:1.5px solid #ccc;border-radius:5px;margin-bottom:10px}
.modal-box input:focus{border-color:#6d28d9;outline:none}
.mbtns{display:flex;gap:10px;justify-content:flex-end}
.mbtns button{padding:8px 20px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:bold}
.btn-salvar{background:#6d28d9;color:#fff}
.btn-fechar{background:#eee;color:#333}
.gas-st{font-size:11px;color:#888;margin-bottom:8px}

/* input file escondido */
#fileInput{display:none}

@media (max-width:700px){
  .topbar{padding:8px 10px;gap:8px;flex-wrap:wrap}
  .topbar h1{font-size:13px}
  .grid2{grid-template-columns:1fr}
  .sec-hd img{height:44px;width:44px}
  .sec-hd .tit{font-size:11px}
  .page{margin:8px auto 30px;padding:0 8px}
  .mes-header{padding:10px 14px;flex-direction:column;align-items:flex-start;gap:4px}
  .mes-header .titulo{font-size:18px}
  .mes-header .regente{text-align:left}
  table.t{font-size:12px}
  table.t td{padding:3px 4px;white-space:normal;word-break:break-word}
  table.t td.dt{width:32px;font-size:11px}
  table.t th{font-size:11px;padding:3px 4px}
  .turg-grid{grid-template-columns:1fr 1fr;gap:6px}
  .nm{font-size:12px}
  .dlbl{font-size:10px}
  #monthSelect{min-width:130px;font-size:13px}
  .btn-atualizar,.btn-imprimir{padding:6px 12px;font-size:12px}
}
@media (max-width:400px){
  .turg-grid{grid-template-columns:1fr}
  table.t td{font-size:11px}
}
@media print{
  .topbar{display:none!important}
  body{background:#fff}
  .page{padding:0}
  .sec{box-shadow:none;border:1px solid #ddd}
  .mes-header{box-shadow:none;border:1px solid #ddd}
}
</style>
</head>
<body>

<div class="topbar">
  <img class="logo" id="logoImg" src="" alt="Logo">
  <h1>Escala — Hermínia Andrade</h1>
  <select id="monthSelect" title="Mês"></select>
  <button class="btn-atualizar" onclick="loadFromGAS()">🔄 Atualizar</button>
  <button class="btn-imprimir" id="btnPrint" onclick="printEscala()">🖨️ Imprimir</button>
  <input type="file" id="fileInput" accept=".xlsx,.xlsm,.xls" style="display:none">
  <span class="status-msg" id="status" style="display:none"></span>
</div>


<div class="page" id="output">
  <div class="sem-dados">⏳ Carregando dados...</div>
</div>

/* ========================================================
   IMPRESSÃO — Layout igual à aba PDF (uma única folha A4)
   ======================================================== */
function printEscala() {
  try {
    var cod = document.getElementById('monthSelect').value;
    if (!cod || !GLOBAL) { alert('Selecione um mês primeiro.'); return; }
    var md = GLOBAL.byMonth[cod];
    if (!md) return;

    var bd = md.byDate, q = md.quartas, s = md.sabados, d = md.domingos;
    var todasDatas = q.concat(s).concat(d).filter(function(v,i,a){return a.indexOf(v)===i;}).sort();
    var meses2 = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    var tit = meses2[parseInt(cod.split('-')[0])] + ' / ' + cod.split('-')[1];

    function dd(dt){ var p=dt.split('-'); return p[2]+'/'+p[1]; }
    function gv(dt,t){ return (bd[dt]&&bd[dt][t]&&bd[dt][t]!=='?'&&bd[dt][t]!=='#N/A') ? bd[dt][t] : '—'; }
    function ds(dt){ return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(Date.UTC(+dt.slice(0,4),+dt.slice(5,7)-1,+dt.slice(8,10))).getUTCDay()]; }
    function cel(v){ return '<td>'+(v==='NAO SEREMOS'?'Não Seremos':v)+'</td>'; }
    function tit2(t){return '<tr><td colspan="20" class="sh">'+t+'</td></tr>';}
    function cab(cols){ return '<tr class="hd"><th>Data</th><th>Dia</th>'+cols.map(function(c){return '<th>'+c+'</th>';}).join('')+'</tr>';}

    var rows = '';

    // Seção 1
    rows += tit2('ORÁCULO DE SIMIROMBA · CRUZ DO CAMINHO · IMUNIZAÇÃO');
    rows += cab(['Oráculo','Cruz 1','Cruz 2','Imun. LUA','Imun. SOL']);
    todasDatas.forEach(function(dt){
      rows += '<tr><td>'+dd(dt)+'</td><td>'+ds(dt)+'</td>'
        +cel(gv(dt,'ORACULO'))+cel(gv(dt,'CRUZ DO CAMINHO 1'))+cel(gv(dt,'CRUZ DO CAMINHO 2'))
        +cel(gv(dt,'IMUNIZACAO LUA'))+cel(gv(dt,'IMUNIZACAO SOL'))+'</tr>';
    });

    // Seção 2
    rows += tit2('ESMENIAS — LUA');
    rows += cab(['Lua 1','Lua 2','Lua 3','Lua 4','Lua 5']);
    s.forEach(function(dt){
      rows += '<tr><td>'+dd(dt)+'</td><td>Sáb</td>'
        +[1,2,3,4,5].map(function(n){return cel(gv(dt,'ESMENIAS LUA '+n));}).join('')+'</tr>';
    });

    // Seção 3
    rows += tit2('ESMENIAS — SOL');
    rows += cab(['Sol 1','Sol 2','Sol 3','Sol 4']);
    s.forEach(function(dt){
      rows += '<tr><td>'+dd(dt)+'</td><td>Sáb</td>'
        +[1,2,3,4].map(function(n){return cel(gv(dt,'ESMENIAS SOL '+n));}).join('')+'</tr>';
    });

    // Seção 4
    rows += tit2('ESTRELA SUBLIMAÇÃO · ARAME · JULGAMENTO REP. KOATAY 108');
    rows += cab(['Canto','Madrinha','Arame','Julgamento']);
    s.forEach(function(dt){
      rows += '<tr><td>'+dd(dt)+'</td><td>Sáb</td>'
        +cel(gv(dt,'ESTRELA SUBLIMAÇÃO CANTO'))+cel(gv(dt,'ESTRELA SUBLIMAÇÃO MADRINHA'))
        +cel(gv(dt,'ARAME'))+cel(gv(dt,'JULGAMENTO REP. KOATAY 108'))+'</tr>';
    });

    // Seção 5
    rows += tit2('TURIGANO');
    rows += cab(['R. Pytia','R. Falange','Atacas','Pão Nosso']);
    d.forEach(function(dt){
      rows += '<tr><td>'+dd(dt)+'</td><td>Dom</td>'
        +cel(gv(dt,'TURIGANO  PYTIA'))+cel(gv(dt,'TURIGANO R. FALANGE'))
        +cel(gv(dt,'TURIGANO ATACAS'))+cel(gv(dt,'TURIGANO PÃO NOSSO'))+'</tr>';
    });

    // Seção 6
    rows += tit2('TURIGANO — CORTE DE PYTIA');
    rows += cab(['Corte 1','Corte 2','Corte 3','Corte 4']);
    d.forEach(function(dt){
      rows += '<tr><td>'+dd(dt)+'</td><td>Dom</td>'
        +cel(gv(dt,'TURIGANO CORTE  1'))+cel(gv(dt,'TURIGANO CORTE  2'))
        +cel(gv(dt,'TURIGANO CORTE  3'))+cel(gv(dt,'TURIGANO CORTE  4'))+'</tr>';
    });

    // Seção 7
    rows += tit2('LEITO MAGNÉTICO');
    rows += cab(['LUA','SOL']);
    q.forEach(function(dt){
      rows += '<tr><td>'+dd(dt)+'</td><td>Qua</td>'
        +cel(gv(dt,'LEITO MAGNÉTICO LUA'))+cel(gv(dt,'LEITO MAGNÉTICO SOL'))+'</tr>';
    });

    // Seção 8
    rows += tit2('BENÇÃO DO MINISTRO GAMURIO');
    rows += cab(['Sol 1','Sol 2']);
    d.forEach(function(dt){
      var s1=gv(dt,'BENÇÃO M.GAMURIO 1'), s2=gv(dt,'BENÇÃO M.GAMURIO 2');
      if(s1==='—'&&s2==='—') return;
      rows += '<tr><td>'+dd(dt)+'</td><td>Dom</td>'+cel(s1)+cel(s2)+'</tr>';
    });

    // Seção 9
    var temI = d.some(function(dt){return [1,2,3,4,5,6,7,8].some(function(n){return bd[dt]&&bd[dt]['IMANTRACAO EXTERNA '+n];});});
    if(temI){
      rows += tit2('IMANTRAÇÃO EXTERNA');
      rows += cab(['1','2','3','4','5','6','7','8']);
      d.forEach(function(dt){
        var vs=[1,2,3,4,5,6,7,8].map(function(n){return gv(dt,'IMANTRACAO EXTERNA '+n);});
        if(vs.every(function(v){return v==='—';})) return;
        rows += '<tr><td>'+dd(dt)+'</td><td>Dom</td>'+vs.map(cel).join('')+'</tr>';
      });
    }

    // Banner
    // Cabeçalho: banner + título
    var bannerHtml = IMGS.banner
      ? '<img src="'+IMGS.banner+'" style="width:100%;height:42px;object-fit:cover;display:block">'
      : '';

    var cabHtml = '<div style="border-bottom:2px solid #4c1d95;margin-bottom:4px;padding-bottom:3px">'
      + bannerHtml
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">'
      + '<div>'
      +   '<div style="font-size:9pt;font-weight:bold;color:#4c1d95;letter-spacing:.5px">ESCALA DE TRABALHO YURICY</div>'
      +   '<div style="font-size:6pt;color:#888;margin-top:1px">'+tit+' &nbsp;|&nbsp; herminia.andrade.ce@gmail.com</div>'
      + '</div>'
      + '<div style="font-size:6pt;color:#555;text-align:right">'
      +   'Regente: Hermínia Maria Freire de Andrade'
      + '</div>'
      + '</div></div>';

    // Assinatura profissional
    var rodape = '<div style="margin-top:16px;padding-top:4px">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-end;padding:0 30px">'
      +   '<div style="text-align:center;min-width:220px">'
      +     '<div style="border-top:1px solid #4c1d95;padding-top:4px;margin-top:40px">'
      +       '<div style="font-size:7pt;font-weight:bold;color:#222;letter-spacing:.5px">REGENTE YURICY</div>'
      +       '<div style="font-size:6.5pt;color:#555">Hermínia Maria Freire de Andrade</div>'
      +     '</div>'
      +   '</div>'
      +   '<div style="text-align:center;font-size:6pt;color:#888;align-self:flex-end;margin-bottom:2px">'
      +     tit + ' &nbsp;|&nbsp; herminia.andrade.ce@gmail.com'
      +   '</div>'
      + '</div></div>';

    // HTML completo
    var docHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Escala '+tit+'</title>'
      +'<style>'
      +'html,body{margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}'

/* ========================================================
   ESTADO GLOBAL
   ======================================================== */
let GLOBAL = null; // { byMonth: { "03-2026": { byDate, quartas, sabados, domingos } } }

const MONTH_NAMES = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                     'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

/* ========================================================
   CONVERTER SERIAL EXCEL → STRING "yyyy-mm-dd" (UTC puro)
   O SheetJS armazena datas como número serial (ex: 46025 = 03/01/2026).
   Convertemos diretamente para UTC para evitar desvio de fuso horário.
   ======================================================== */
function excelSerialToDateStr(val) {
  // Caso 1: número serial do Excel
  if (typeof val === 'number' && val > 0) {
    // Excel tem bug de 1900-02-29; ajuste padrão é subtrair 25569
    const ms = Math.round((val - 25569) * 86400000);
    const d  = new Date(ms);
    const y  = d.getUTCFullYear();
    const m  = String(d.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(d.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${dd}`;
  }
  // Caso 2: objeto Date (cellDates:true)
  if (val instanceof Date) {
    const y  = val.getUTCFullYear();
    const m  = String(val.getUTCMonth() + 1).padStart(2, '0');
    const dd = String(val.getUTCDate()).padStart(2, '0');
    return `${y}-${m}-${dd}`;
  }
  // Caso 3: string já formatada
  if (typeof val === 'string') {
    const s = val.trim();
    // Formato ISO "2026-03-04" ou com hora
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0, 10);
    // Tenta parsear outros formatos
    const ts = Date.parse(s);
    if (!isNaN(ts)) {
      const d  = new Date(ts);
      const y  = d.getUTCFullYear();
      const mo = String(d.getUTCMonth() + 1).padStart(2, '0');
      const dd = String(d.getUTCDate()).padStart(2, '0');
      return `${y}-${mo}-${dd}`;
    }
  }
  return null;
}

/* ========================================================
   CARREGAR DADOS DO GOOGLE APPS SCRIPT
   ======================================================== */
async function loadFromGAS() {
  const url = getGasUrl();
  if (!url) return;

  document.getElementById('output').innerHTML =
    '<div class="sem-dados">⏳ Buscando dados da planilha...<br><small>Aguarde um momento.</small></div>';

  try {
    // Timeout de 20 segundos
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 20000);

    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);

    if (!resp.ok) throw new Error(`Erro HTTP ${resp.status}`);

    const text = await resp.text();
    let json;
    try {
      json = JSON.parse(text);
    } catch(e) {
      throw new Error('O Apps Script retornou resposta inválida. Verifique se o código foi atualizado e reimplantado corretamente.');
    }

    if (!json.ok) throw new Error(json.erro || 'Erro no Apps Script: ' + JSON.stringify(json).substring(0,100));

    parseRows(json.linhas, '🌐 Google Sheets');

  } catch (err) {
    const msg = err.name === 'AbortError'
      ? 'Tempo esgotado (20s). O Apps Script pode estar demorando ou com erro.'
      : err.message;

    document.getElementById('output').innerHTML = `
      <div class="sem-dados" style="color:#c0392b">
        ⚠️ <strong>Erro ao carregar</strong><br><br>
        <div style="font-size:13px;background:#fff0f0;border:1px solid #f5c6cb;border-radius:8px;padding:12px 16px;max-width:500px;margin:0 auto;text-align:left;color:#333">
          ${escHtml(msg)}
        </div><br>
        <span style="font-size:12px;color:#888">
          Verifique o Apps Script ou use o botão <strong>📂 Arquivo local</strong>.
        </span><br><br>
        <button onclick="loadFromGAS()" style="padding:8px 20px;background:#6d28d9;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">🔄 Tentar novamente</button>
      </div>`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Ao abrir a página: carregar automaticamente sempre (tem URL padrão)
window.addEventListener('load', loadFromGAS);

/* leitura de arquivo local */
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const wb = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
      const ws = wb.Sheets['ESCALA'];
      if (!ws) { alert('Aba ESCALA não encontrada!'); return; }
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true });
      parseRows(rows, '📁 ' + file.name);
    } catch(err) { alert('Erro ao ler arquivo: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
  this.value = '';
});

/* ── PARSEROWS ─────────────────────────────────────────── */
function parseRows(rows, sourceName) {
  const byMonth = {};
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r[0] === undefined || r[0] === null || r[0] === '') continue;
    const dateStr = excelSerialToDateStr(r[0]);
    if (!dateStr) continue;
    const trabalho = String(r[2] || '').trim();
    if (!trabalho) continue;
    const ninfa = String(r[1] || '').trim();
    const [yr, mm] = dateStr.split('-');
    const mesCod = mm + '-' + yr;
    if (!byMonth[mesCod]) byMonth[mesCod] = { byDate:{}, quartas:[], sabados:[], domingos:[], outros:[] };
    const m = byMonth[mesCod];
    if (!m.byDate[dateStr]) {
      m.byDate[dateStr] = {};
      const dow = new Date(Date.UTC(+yr, +mm-1, +dateStr.split('-')[2])).getUTCDay();
      if      (dow===3) { if(!m.quartas.includes(dateStr))  m.quartas.push(dateStr); }
      else if (dow===6) { if(!m.sabados.includes(dateStr))  m.sabados.push(dateStr); }
      else if (dow===0) { if(!m.domingos.includes(dateStr)) m.domingos.push(dateStr); }
      else              { if(!m.outros.includes(dateStr))   m.outros.push(dateStr); }
    }
    m.byDate[dateStr][trabalho] = ninfa;
  }
  for (const m of Object.values(byMonth)) {
    m.quartas.sort(); m.sabados.sort(); m.domingos.sort(); m.outros.sort();
  }
  GLOBAL = { byMonth };

  const sel = document.getElementById('monthSelect');
  sel.style.display = 'inline-block';
  sel.innerHTML = '';
  const meses = Object.keys(byMonth).sort((a,b) => {
    const [ma,ya] = a.split('-').map(Number);
    const [mb,yb] = b.split('-').map(Number);
    return (ya*12+ma)-(yb*12+mb);
  });
  meses.forEach(cod => {
    const [mm] = cod.split('-');
    const opt = document.createElement('option');
    opt.value = cod;
    opt.textContent = MONTH_NAMES[parseInt(mm)] + ' / ' + cod.split('-')[1];
    sel.appendChild(opt);
  });
  const now = new Date();
  const curCod = String(now.getMonth()+1).padStart(2,'0') + '-' + now.getFullYear();
  sel.value = meses.includes(curCod) ? curCod : meses[0];

  const bp = document.getElementById('btnPrint');
  if (bp) bp.style.display = 'inline-block';

  let totalDatas=0, totalReg=0;
  for (const m of Object.values(byMonth)) {
    totalDatas += Object.keys(m.byDate).length;
    totalReg   += m.quartas.length + m.sabados.length + m.domingos.length;
  }
  setStatus('✅ ' + sourceName + ' — ' + meses.length + ' meses · ' + totalDatas + ' datas');
  renderMes(sel.value);
}

document.getElementById('monthSelect').addEventListener('change', function() {
  renderMes(this.value);
});

/* ── HELPERS ───────────────────────────────────────────── */
function fmtDt(d) {
  if (!d) return '';
  const p = d.split('-');
  return p[2] + '/' + p[1];
}
function nmHtml(v) {
  if (!v || v==='?' || v==='#N/A' || v==='undefined' || v==='None')
    return '<span class="nm vazio">—</span>';
  if (v==='NAO SEREMOS' || v==='Não Seremos')
    return '<span class="nm naosera">Não Seremos</span>';
  return '<span class="nm">' + esc(v) + '</span>';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function get(byDate, d, trabalho) {
  return (byDate[d] && byDate[d][trabalho]) ? byDate[d][trabalho] : '';
}
function blocoSimples(label, datas, byDate, trabalho) {
  if (!datas.length) return '';
  let h = '<div class="dlbl">'+label+'</div><table class="t"><tbody>';
  datas.forEach(d => {
    h += '<tr><td class="dt">'+fmtDt(d)+'</td><td>'+nmHtml(get(byDate,d,trabalho))+'</td></tr>';
  });
  return h + '</tbody></table>';
}
function blocoMulti(label, datas, byDate, colunas) {
  if (!datas.length) return '';
  let h = '<div class="dlbl">'+label+'</div><table class="t"><thead><tr><th></th>'
    + colunas.map(c=>'<th>'+esc(c.lbl)+'</th>').join('') + '</tr></thead><tbody>';
  datas.forEach(d => {
    h += '<tr><td class="dt">'+fmtDt(d)+'</td>';
    colunas.forEach(c => h += '<td>'+nmHtml(get(byDate,d,c.trab))+'</td>');
    h += '</tr>';
  });
  return h + '</tbody></table>';
}
function sec(cls, titulo, corpo, imgKey) {
  const imgSrc = imgKey && IMGS[imgKey]
    ? '<img src="'+IMGS[imgKey]+'" alt="">'
    : '';
  return '<div class="sec '+cls+'">'
    + '<div class="sec-hd">'+imgSrc+'<span class="tit">'+titulo+'</span></div>'
    + '<div class="sec-body">'+(corpo||'<em style="color:#bbb;font-size:12px">Sem dados</em>')+'</div>'
    + '</div>';
}

function secEsmenias(s,bd) {

  s.forEach(d => {

    c += '<table class="t" style="margin-bottom:4px"><thead><tr>'
      +'<th style="width:36px">'+fmtDt(d)+'</th><th>SOL</th><th>LUA</th></tr></thead><tbody>';
    for(let i=0;i<Math.max(sol.length,lua.length);i++){
      c += '<tr><td class="dt">'+(i+1)+'.</td>'
        +'<td>'+nmHtml(sol[i]||'')+'</td>'

    c += '</tbody></table>';

    +'</div>'
    +'<div class="regente">Regente: Hermínia Andrade</div>'

    +'</div>';

    +secEsmenias(sabados,byDate)

  html += '<div class="pg-foot">'

  document.getElementById('output').innerHTML = html;
